#        acts-config        #

# 数据源 bean 所在 bundle (扫描包路径)
datasource_bundle_name = {{basePackage}}.infrastructure.zdal

# 数据源 bean 与表的映射,支持正则
# 格式: ds_{datasourceBeanName} = {tablePattern,...}
ds_singleDataSource = *_{{appName}},{{appName}}_*


# DB 连接配置 (Optional)
# dbconf_file = devdb.conf

# 自动收集用例结果
collect_case_result=true

# 按用例名过滤,支持正则 (Optional)
#test_only = ^T
