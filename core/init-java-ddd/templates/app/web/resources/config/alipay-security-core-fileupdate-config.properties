#任意文件上传防护过滤器配置，使用文档:https://yuque.antfin-inc.com/product_sec/secueirt-core-doc/ncv00o
alipay.security.core.fileupdate.fileUpdateCheckFilter=true
#alipay.security.core.fileupdate.urlWhiteList
alipay.security.core.fileupdate.safeSuffixList=.jpg,.jpeg,.png,.gif,.txt,.docs,.csv
alipay.security.core.fileupdate.maxFileSize=5242880
alipay.security.core.fileupdate.statusCode=200
alipay.security.core.fileupdate.charset=UTF-8
alipay.security.core.fileupdate.errorMsg={"stat":"fail","msg":"Invalid File Info"}
alipay.security.core.fileupdate.throwSwitch=false
alipay.security.core.fileupdate.exceptionMsg=Invalid File Info
