# Java DDD 预设配置
# 适用项目：Java Spring Boot + DDD 分层架构

# 核心技能
skills:
  - name: dev-flow
    path: core/dev-flow/
    description: AI 编程主工作流（clarify → implement → verify）
  - name: clarify
    path: core/clarify/
    description: 需求拆解与约束定义，产出行为契约和项目简报
  - name: implement
    path: core/implement/
    description: 自动实现循环，读取行为契约生成代码，产出判断日志
  - name: verify
    path: core/verify/
    description: 验证与判断审查，验证代码正确性并帮人聚焦关键判断
  - name: analyze
    path: core/analyze/
    description: 架构合规分析，基于编码标准和审查规则检查代码质量

# 命令
commands:
  - name: checkpoint
    path: commands/checkpoint.md
    description: 关键判断审查命令
  - name: state
    path: commands/state.md
    description: Feature 状态追踪命令

# 编码标准
standards:
  path: standards/java-ddd/
  files:
    - standards.md        # 编码标准
    - review-rules.md     # 审查规则
    - test-standards.md   # 测试标准

# 模板
templates:
  path: templates/
  files:
    - contract-template.md  # 行为契约模板
    - brief-template.md     # 项目简报模板

# 项目结构约定
project:
  # 行为契约存放位置
  contracts_dir: contracts/
  # 项目简报存放位置
  briefs_dir: briefs/
  # 判断日志存放位置
  judgment_logs_dir: .claude/judgment-logs/
  # Feature 注册表
  registry: .claude/contracts/registry.md